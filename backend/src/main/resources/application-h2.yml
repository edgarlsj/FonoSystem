spring:
  application:
    name: fonosystem

  datasource:
    url: jdbc:h2:mem:fonosystem;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: false

  sql:
    init:
      mode: never

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Sao_Paulo

server:
  port: 8080
  servlet:
    context-path: /api

# JWT
jwt:
  secret: fonosystem-jwt-secret-key-2026-super-seguro-256bits-dev-local-h2
  expiration: 3600000
  refresh-expiration: 604800000

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    br.com.fonosystem: DEBUG
    org.springframework.security: INFO
