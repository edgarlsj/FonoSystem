spring:
  application:
    name: fonosystem

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fonosystem}
    username: ${SPRING_DATASOURCE_USERNAME:fono_admin}
    password: ${SPRING_DATASOURCE_PASSWORD:fono_secret_2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: America/Sao_Paulo

server:
  port: 8080
  servlet:
    context-path: /api

# JWT
jwt:
  secret: ${JWT_SECRET:fonosystem-jwt-secret-key-2026-super-seguro-256bits-dev}
  expiration: 14400000      # 4 horas em ms
  refresh-expiration: 604800000  # 7 dias em ms

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    br.com.fonosystem: DEBUG
    org.springframework.security: INFO
