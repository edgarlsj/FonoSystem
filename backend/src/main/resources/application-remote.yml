spring:
  datasource:
    url: jdbc:postgresql://ep-ancient-sunset-amumgjyl-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    br.com.fonosystem: DEBUG
    org.springframework.security: INFO
